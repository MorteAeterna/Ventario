<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="{% url 'lista_productos' %}">
            Ventario
        </a>
        <div class="d-flex align-items-center gap-2">
            <a href="{% url 'lista_productos' %}" class="btn btn-outline-light btn-sm">
                Inventario
            </a>
            <a href="{% url 'nueva_venta' %}" class="btn btn-outline-light btn-sm">
                Ventas
            </a>
            <a href="{% url 'lista_categorias' %}" class="btn btn-outline-light btn-sm">
                Categorías
            </a>
            <a href="{% url 'historial_ventas' %}" class="btn btn-outline-light btn-sm">
                Historial de Ventas
            </a>
            <span class="text-white ms-3">{{ request.user.username }}</span>
            <form method="POST" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-danger btn-sm">Cerrar sesión</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        {% block contenido %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>

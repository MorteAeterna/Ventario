<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escanear producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
</head>
<body class="bg-dark text-white">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Escanear código de barras</h4>
        <a href="/" class="btn btn-outline-light btn-sm">
            ← Ir al inventario
        </a>
    </div>

    <!-- Vista de cámara -->
    <div id="contenedor-video" class="ratio ratio-1x1 mb-3 rounded overflow-hidden" style="max-width: 400px; margin: auto;">
        <video id="video" class="w-100"></video>
    </div>

    <!-- Resultado del escaneo -->
    <div id="resultado" class="text-center mb-3" style="display:none;">
        <div class="alert alert-success">
            <p class="mb-1">Código detectado:</p>
            <p class="fw-bold fs-5" id="codigo-detectado"></p>
        </div>
        <div class="mb-3">
            <label class="form-label">Cantidad a agregar:</label>
            <input type="number" id="cantidad" class="form-control text-center" value="1" min="1" style="max-width: 150px; margin: auto;">
        </div>
        <button onclick="confirmarEscaneo()" class="btn btn-success btn-lg w-100">
            Confirmar
        </button>
        <button onclick="reiniciar()" class="btn btn-secondary mt-2 w-100">
            Escanear otro
        </button>
    </div>

    <!-- Mensaje de confirmación -->
    <div id="mensaje" class="mt-3"></div>

    <!-- Formulario para producto nuevo -->
    <div id="form-nuevo" style="display:none;">
        <div class="alert alert-warning text-dark">
            Producto no encontrado. Completa los datos para registrarlo.
        </div>
        <form method="POST" action="/agregar/" id="form-producto-nuevo">
            {% csrf_token %}
            <input type="hidden" name="codigo" id="nuevo-codigo">
            <input type="hidden" name="desde_escaner" value="1">
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Marca</label>
                <input type="text" name="marca" class="form-control">
            </div>
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label mb-0">Categoría</label>
                    <button type="button" class="btn btn-outline-light btn-sm"
                            data-bs-toggle="modal" data-bs-target="#modalCategoria">
                        + Nueva categoría
                    </button>
                </div>
                <select name="categoria" id="select-categoria" class="form-select mt-1">
                    <option value="">Sin categoría</option>
                    {% for cat in categorias %}
                    <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Cantidad inicial</label>
                <input type="number" name="cantidad" class="form-control" value="1" min="1">
            </div>
            <div class="mb-3">
                <label class="form-label">Precio</label>
                <input type="number" name="precio" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Stock mínimo</label>
                <input type="number" name="stock_minimo" class="form-control" value="5">
            </div>
            <button type="submit" class="btn btn-success w-100">Guardar producto</button>
            <button type="button" onclick="reiniciar()" class="btn btn-secondary mt-2 w-100">Cancelar</button>
            <a href="/" class="btn btn-outline-light mt-2 w-100">← Ir al inventario</a>
        </form>
    </div>
</div>

<!-- Modal nueva categoría -->
<div class="modal fade" id="modalCategoria" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header">
                <h5 class="modal-title">Nueva categoría</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre de la categoría</label>
                    <input type="text" id="nueva-categoria-nombre" class="form-control" placeholder="Ej: Bebidas">
                </div>
                <div id="categoria-mensaje"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="crearCategoria()">
                    <i class="bi bi-check-circle"></i> Crear
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    let codigoEscaneado = '';

    codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
        if (result) {
            codigoEscaneado = result.getText();
            codeReader.reset();
            document.getElementById('codigo-detectado').textContent = codigoEscaneado;
            document.getElementById('resultado').style.display = 'block';
        }
    });

    function confirmarEscaneo() {
        const cantidad = document.getElementById('cantidad').value;
        fetch('/escanear/procesar/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({codigo: codigoEscaneado, cantidad: cantidad})
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'existe') {
                document.getElementById('resultado').style.display = 'none';
                document.getElementById('mensaje').innerHTML = `
                    <div class="alert alert-success text-center">
                        <strong>${data.nombre} ${data.marca}</strong><br>
                        Stock actualizado a <strong>${data.cantidad_nueva}</strong> unidades.
                        <br><br>
                        <button onclick="reiniciar()" class="btn btn-outline-light btn-sm">🔄 Escanear otro</button>
                        <a href="/" class="btn btn-outline-light btn-sm ms-2">← Ir al inventario</a>
                    </div>`;
            } else {
                document.getElementById('resultado').style.display = 'none';
                document.getElementById('contenedor-video').style.display = 'none';
                document.getElementById('nuevo-codigo').value = codigoEscaneado;
                document.getElementById('form-nuevo').style.display = 'block';
            }
        });
    }

    function reiniciar() {
        codigoEscaneado = '';
        document.getElementById('resultado').style.display = 'none';
        document.getElementById('form-nuevo').style.display = 'none';
        document.getElementById('mensaje').innerHTML = '';
        document.getElementById('contenedor-video').style.display = 'block';
        codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
            if (result) {
                codigoEscaneado = result.getText();
                codeReader.reset();
                document.getElementById('codigo-detectado').textContent = codigoEscaneado;
                document.getElementById('resultado').style.display = 'block';
            }
        });
    }

    function crearCategoria() {
        const nombre = document.getElementById('nueva-categoria-nombre').value.trim();
        if (!nombre) {
            document.getElementById('categoria-mensaje').innerHTML =
                '<div class="alert alert-danger">Por favor escribe un nombre.</div>';
            return;
        }

        fetch('/categorias/crear-ajax/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({nombre: nombre})
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                const select = document.getElementById('select-categoria');
                const option = new Option(data.nombre, data.id, true, true);
                select.appendChild(option);
                select.value = data.id;

                document.getElementById('categoria-mensaje').innerHTML =
                    '<div class="alert alert-success">Categoría creada correctamente.</div>';

                setTimeout(() => {
                    const modal = bootstrap.Modal.getInstance(document.getElementById('modalCategoria'));
                    modal.hide();
                    document.getElementById('nueva-categoria-nombre').value = '';
                    document.getElementById('categoria-mensaje').innerHTML = '';
                }, 1000);
            } else {
                document.getElementById('categoria-mensaje').innerHTML =
                    '<div class="alert alert-danger">Error al crear la categoría.</div>';
            }
        });
    }
</script>
</body>
</html>
